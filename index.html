<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{overflow:hidden;color:white;background:black;}

.background{
position:fixed;width:100%;height:100%;
background:url('https://i.imgur.com/6s8XGQp.jpg') center/cover no-repeat;
filter:blur(10px);z-index:-2;transition:2s;
}

.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(8px);
z-index:-1;transition:2s;
}

.screen{
position:absolute;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;padding:20px;
opacity:0;transition:1s;z-index:1;pointer-events:none;
}

.screen.active{opacity:1;pointer-events:auto;}

h1{font-size:2.5rem;margin-bottom:10px;}

button{
padding:10px 20px;border:none;border-radius:20px;background:pink;cursor:pointer;margin-top:15px;
transition:0.2s;
}
button:active{transform:scale(0.95);} 

/* hearts */
.heart{position:absolute;color:pink;animation:floatUp 5s linear infinite;}
@keyframes floatUp{from{transform:translateY(100vh);}to{transform:translateY(-10vh);opacity:0;}}

/* typing */
.typing{white-space:pre-wrap;border-right:2px solid white;max-width:600px;}

/* gallery */
.gallery{
position:relative;
width:300px;
height:300px;
overflow:hidden;
border-radius:20px;
touch-action:pan-y;
margin:20px auto; /* tengah */
display:flex;
align-items:center;
justify-content:center;
}

.gallery img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
opacity:0;
transition:opacity 0.8s ease-in-out, transform 6s ease, filter 1s ease;
transform:scale(1);
filter:grayscale(100%); /* hitam putih */
}

.gallery img.active{
opacity:1;
transform:scale(1.1);
filter:grayscale(0%); /* jadi berwarna saat aktif */
}

.gallery img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
border-radius:20px;
opacity:0;
transition:opacity 1s ease-in-out;
}

.gallery img.active{
opacity:1;
}
.gallery img{width:120px;height:120px;border-radius:15px;object-fit:cover;}

/* ending */
.ending{
position:absolute;width:100%;height:100%;
display:flex;align-items:center;justify-content:center;
font-size:2.5rem;background:black;opacity:0;transition:2s;
z-index:50;pointer-events:none;text-align:center;padding:20px;
}

.ending.show{opacity:1;pointer-events:auto;}

.fadeOut{opacity:0 !important;}

</style>
</head>
<body>

<div class="background" id="bg"></div>
<div class="overlay" id="ov"></div>

<!-- Screen flow -->
<div class="screen active" id="s1">
<h1>ALOOOOO SAYANGGGGGG ❤️</h1>
<p>punyakaaa sesuatu buatttt pacarkuuu iniii...</p>
<button onclick="next(1)">Lanjut</button>
</div>

<div class="screen" id="s2">
<h1>Hari ini spesial 🎂</h1>
<p>Karena kamu lahir ke dunia ini...</p>
<button onclick="next(2)">Lanjut</button>
</div>

<div class="screen" id="s3">
<h1>Kenangan Kita 📸</h1>
<p style="margin-top:5px; opacity:0.8; font-size:0.9rem;">Geser (swipe) atau klik untuk melihat foto ➡️</p>
<div class="gallery" id="gallery">
<img src="img/img1.jpeg" class="active">
<img src="img/img2.jpeg">
<img src="img/img3.jpeg">
<img src="img/img4.jpeg">
<img src="img/img5.jpeg">
<img src="img/img6.jpeg">
<img src="img/img7.jpeg">
<img src="img/img14.jpeg">
<img src="img/img15.jpeg">
<img src="img/img10.jpeg">
</div>
<button onclick="next(3)">Lanjut</button>
</div>

<div class="screen" id="s4">
<h1>Pesan Untuk Kamu 💌</h1>
<p id="text" class="typing"></p>
<button onclick="next(4)">Lanjut</button>
</div>

<div class="screen" id="s5">
<button onclick="showEnding()">🎁</button>
</div>

<!-- Ending cinematic -->
<div class="ending" id="ending">
<p id="endingText"></p>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<script>
function next(n){
document.getElementById('s'+n).classList.remove('active');
document.getElementById('s'+(n+1)).classList.add('active');
if(n===3){startTyping();playMusic();}
}

function playMusic(){document.getElementById('music').play();}

// typing main
const msg=`Selamat ulang tahun yangg ke 21 sayanggg ❤️\n\nBersyukurr s'kalikaaa sayangg bisa samaa sayaaa.\nSayangg bukannn cuman orangg spesialll sayanggg...\ntapi selaluu jadiii rumahkuuuu sayanggg.\nSAYANGG MOGAA DI UMURR 21 INII SAYANGG MAKINNN BAEKkk.......\nSAYANGG JUGAAA DIKASII LANCARR" JALANNNNYA SAYANGGG\nTrusss sayanggg mogaaa bisaaaa baekkk" ditempatt kerjanyaaa sayangkuuu\ndan impiannya untuk kerja di Bali bisa terwujud sayangkuuu\nMogaa sayangg makinn sayang samaa cintakaaa sayang nahhh\n\nSemoga sayangg bisa selalu bahagiaa\ndan sayaaa jadii salah satuu dari bahagianyaa sayanggg.\n\nI love you sayangggggkuuu❤️`;
let i=0;
function startTyping(){
function type(){
if(i<msg.length){
document.getElementById('text').innerHTML+=msg[i];
i++;setTimeout(type,40);
}}
type();
}

// ending cinematic
function showEnding(){
// hilangkan screen terakhir
 document.getElementById('s5').classList.add('fadeOut');

// gelapkan background
 document.getElementById('bg').style.filter='blur(20px) brightness(0.3)';
 document.getElementById('ov').style.background='black';

// tampilkan ending
 const ending=document.getElementById('ending');
 ending.classList.add('show');

 // typing ending
 const text="I LOVEEE YOUUU IN EVERYYY UNIVERSEEE HONEYYYYY ❤️";
 let j=0;
 function typeEnd(){
   if(j<text.length){
     document.getElementById('endingText').innerHTML+=text[j];
     j++;
     setTimeout(typeEnd,80);
   }
 }
 setTimeout(typeEnd,800);
}

// swipe + manual gallery
let current = 0;
const images = document.querySelectorAll('#gallery img');
let startX = 0;

function showImage(index){
  images[current].classList.remove('active');
  current = (index + images.length) % images.length;
  images[current].classList.add('active');
}

// swipe mobile
document.getElementById('gallery').addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

document.getElementById('gallery').addEventListener('touchend', e => {
  let endX = e.changedTouches[0].clientX;
  if(startX - endX > 50){
    showImage(current + 1);
  } else if(endX - startX > 50){
    showImage(current - 1);
  }
});

// klik desktop
document.getElementById('gallery').addEventListener('click', () => {
  showImage(current + 1);
});

// hearts
setInterval(()=>{
let h=document.createElement('div');
h.className='heart';
h.style.left=Math.random()*100+'vw';
h.innerHTML='❤️';
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},500);
</script>

</body>
</html>
